<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Körkort Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Körkort Quiz</h1>

    <label for="chapterSelect" class="label">Välj kapitel</label>
    <select id="chapterSelect">
      <option value="alla">Alla kapitel</option>
      <option value="Inledning">Inledning</option>
      <option value="Körfält">Körfält</option>
      <option value="Väjningsregler">Väjningsregler</option>
      <option value="Passager">Passager</option>
      <option value="Cirkulationsplats">Cirkulationsplats</option>
      <option value="Stanna & parkera">Stanna & parkera</option>
      <option value="Landsväg">Landsväg</option>
      <option value="Motorväg">Motorväg & motortrafikled</option>
      <option value="Omkörningar">Omkörningar</option>
      <option value="Järnvägskorsningar">Järnvägskorsningar</option>
      <option value="Speciella gator">Speciella gator</option>
      <option value="Vinter">Vinter</option>
      <option value="Inlärning & mognad">Inlärning & mognad</option>
      <option value="Alkohol">Alkohol</option>
      <option value="Trötthet">Trötthet</option>
      <option value="Synen">Synen</option>
      <option value="Nedsatt förmåga">Nedsatt förmåga</option>
      <option value="Barn">Barn</option>
      <option value="Trafikolyckor">Trafikolyckor</option>
      <option value="Indelning av fordon">Indelning av fordon</option>
      <option value="Sträckor">Sträckor</option>
      <option value="Däck">Däck</option>
      <option value="Styrning">Styrning</option>
      <option value="Bromsar">Bromsar</option>
      <option value="Krocksäkerhet">Krocksäkerhet</option>
      <option value="Bilbarnstolar">Bilbarnstolar</option>
      <option value="Längd & bredd">Längd & bredd</option>
      <option value="Last">Last</option>
      <option value="Belysning">Belysning</option>
      <option value="Säkerhetskontroller">Säkerhetskontroller</option>
      <option value="Besiktning">Besiktning</option>
      <option value="Service">Service</option>
      <option value="Registreringsbevis">Registreringsbevis</option>
      <option value="Försäkring">Försäkring</option>
    </select>

    <button id="startBtn" type="button">Starta quiz</button>

    <div class="top-row">
      <div id="progressText"></div>
      <div id="scoreText"></div>
    </div>

    <div class="progress-bar" aria-hidden="true">
      <div id="progressFill"></div>
    </div>

    <section id="quizBox"></section>
    <section id="result"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
