<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Körkort Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Körkort Quiz</h1>

    <label for="chapterSelect" class="label">Välj kapitel</label>
    <select id="chapterSelect">
      <option value="alla">Alla kapitel</option>
      <option value="Inledning">Inledning</option>
      <option value="Körfält">Körfält</option>
      <option value="Väjningsregler">Väjningsregler</option>
      <option value="Passager">Passager</option>
      <option value="Cirkulationsplats">Cirkulationsplats</option>
      <option value="Stanna & parkera">Stanna & parkera</option>
      <option value="Landsväg">Landsväg</option>
      <option value="Motorväg">Motorväg & motortrafikled</option>
      <option value="Omkörningar">Omkörningar</option>
      <option value="Järnvägskorsningar">Järnvägskorsningar</option>
      <option value="Speciella gator">Speciella gator</option>
      <option value="Vinter">Vinter</option>
    </select>

    <button id="startBtn" type="button">Starta quiz</button>

    <div class="top-row">
      <div id="progressText"></div>
      <div id="scoreText"></div>
    </div>

    <div class="progress-bar" aria-hidden="true">
      <div id="progressFill"></div>
    </div>

    <section id="quizBox"></section>
    <section id="result"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
