100%;background:var(--c)}.chapter-card .body{padding:18px}.chapter-card small{font-size:14px;color:var(--muted);font-weight:900}.chapter-card b{font-size:24px;display:block;margin-top:4px}.chapter-card span{font-size:30px;padding-right:18px}.reader{max-width:720px;margin:0 auto}.listen{border:0;background:var(--blue);color:white;border-radius:18px;width:100%;padding:18px;font-size:22px;font-weight:1000;margin-bottom:20px}.card{background:white;border-radius:24px;padding:22px;margin:18px 0;box-shadow:0 10px 26px #0000000d}.card p{font-size:22px;line-height:1.45;margin:0 0 14px}.card h2{font-size:34px;margin:0 0 12px}.keyrow{display:flex;flex-wrap:wrap;gap:10px}.chip{background:#eaf4ff;border-left:5px solid var(--blue);border-radius:12px;padding:10px 14px;font-size:18px;font-weight:900}.note{background:#eaf4ff;border-left:5px solid var(--blue);font-size:20px;font-weight:800}.navrow{display:grid;grid-template-columns:1fr 1fr;gap:14px}.navbtn,.primary{border:0;border-radius:18px;background:#e9eef5;color:#0d4071;padding:17px;font-size:22px;font-weight:1000}.primary{background:var(--blue);color:white}.visual{border-radius:20px;background:#f2f5f9;min-height:180px;margin:14px 0;padding:18px;display:flex;align-items:center;justify-content:center;overflow:hidden}.visual svg{max-width:100%;height:auto}.formula{font-size:26px;font-weight:1000;text-align:center;background:#111827;color:white;border-radius:18px;padding:18px;margin:12px 0}.example{background:#fff8e8;border-left:5px solid #ffb020}.quizbox{max-width:720px;margin:0 auto}.qtitle{font-size:30px;font-weight:1000;margin:18px 0}.answers{display:grid;gap:14px}.answer{border:3px solid transparent;border-radius:20px;background:white;padding:18px;font-size:22px;text-align:left;display:flex;gap:12px}.answer.correct{background:#c6ffd2;border-color:var(--good)}.answer.wrong{background:#ffc0c7;border-color:var(--bad)}.answer b{min-width:36px}.progress{height:12px;border-radius:999px;background:#e6eaf0;overflow:hidden}.progress div{height:100%;background:var(--blue);width:0}.prov-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;max-width:680px;margin:0 auto}.prov{border:0;border-radius:24px;background:white;padding:24px;text-align:left;box-shadow:0 10px 24px #00000010}.prov b{font-size:28px}.prov p{font-size:18px;color:#666}.question-img img{width:100%;border-radius:18px;max-height:360px;object-fit:contain;background:#eee;margin-bottom:12px}.status{font-size:22px;font-weight:900;color:#0b4075}.result{text-align:center}.big{font-size:54px;font-weight:1000}.pass{color:var(--good)}.fail{color:var(--bad)}.search{width:100%;border:0;border-radius:18px;padding:18px;font-size:22px;margin-bottom:20px}.sign-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.sign{background:white;border-radius:20px;padding:18px;box-shadow:0 8px 18px #0000000c}.sign .s{font-size:44px}.sign b{font-size:22px;display:block}.muted{color:#777}@media(max-width:640px){.app{padding:14px}.homegrid{gap:16px}.tile{height:136px;padding:22px 18px 22px 48px}.tile b{font-size:26px}.tile .emoji{font-size:38px}.pill{font-size:20px}.title{font-size:34px}.tabs{gap:0}.tab{font-size:18px}.card p{font-size:20px}.chapter-card b{font-size:21px}.prov-grid{grid-template-columns:1fr}.sign-grid{grid-template-columns:1fr}}

<script>
const CHAPTERS = [{"category": "Trafikregler", "title": "Inledning", "emoji": "🚦", "sections": ["Trafikens grundregel är att du ska visa omsorg, varsamhet och hänsyn. Du ska köra så att du inte stör eller hindrar andra i onödan.", "I trafiken har ingen egna rättigheter som ger rätt att pressa sig fram. Alla har skyldigheter mot varandra. Barn, äldre och personer med funktionsnedsättning behöver extra hänsyn.", "Defensiv körning betyder att tänka framåt, ha säkerhetsmarginaler och vara beredd på att andra kan göra fel."], "keys": ["Visa hänsyn", "Var tydlig", "Titta långt fram", "Kör lugnt"], "visual": "road"}, {"category": "Trafikregler", "title": "Körfält", "emoji": "🛣️", "sections": ["Ett körfält kan vara markerat med linjer eller räknas som körfält när körbanan är tillräckligt bred för fordon i en fil.", "Grundregeln är att ligga i mitten av ditt körfält. Vid högersväng placerar du dig nära högerkanten, vid vänstersväng nära vänsterkanten i ditt körfält.", "På väg med flera körfält väljer du normalt körfältet längst till höger. Du får välja annat körfält om det passar färdmålet eller vid tät trafik med lägre hastighet."], "keys": ["Mitten av körfältet", "Kontrollera speglar", "Döda vinkeln", "Blinka i god tid"], "visual": "lanes"}, {"category": "Trafikregler", "title": "Väjningsregler", "emoji": "↔️", "sections": ["Högerregeln gäller när inget annat reglerar korsningen. Då ska du lämna företräde åt fordon från höger.", "Väjningsplikt betyder att du tydligt ska visa att du tänker låta andra köra först genom att sakta in eller stanna.", "Trafiksignaler gäller före vägmärken. Polismans tecken gäller före allt annat."], "keys": ["Polis", "Trafiksignal", "Vägmärke", "Regel"], "visual": "priority"}, {"category": "Trafikregler", "title": "Passager", "emoji": "🚶", "sections": ["Vid obevakat övergångsställe har du väjningsplikt mot gående som är ute på eller just ska gå ut på övergångsstället.", "Vid cykelpassage ska du anpassa hastigheten och visa hänsyn. Vid cykelöverfart har du väjningsplikt mot cyklister och mopedister som är ute på eller just ska färdas ut.", "Sök ögonkontakt, sänk farten och var extra försiktig när sikten är skymd."], "keys": ["Gående först", "Sänk farten", "Ögonkontakt", "Skymd sikt = risk"], "visual": "crossing"}, {"category": "Trafikregler", "title": "Cirkulationsplats", "emoji": "🔄", "sections": ["När du kör in i en cirkulationsplats har du väjningsplikt mot fordon som redan är inne i rondellen.", "Blinka när du ska lämna cirkulationsplatsen. Placera dig så tydligt som möjligt efter vart du ska.", "Var uppmärksam på cyklister och gående vid utfarten."], "keys": ["Väjningsplikt in", "Blinka ut", "Låg fart", "Titta höger vid utfart"], "visual": "roundabout"}, {"category": "Trafikregler", "title": "Stanna & parkera", "emoji": "🅿️", "sections": ["Stanna betyder att stå still kort tid, till exempel för att släppa av någon. Parkera är allt annat stillastående.", "Du får inte stanna eller parkera där du hindrar eller skapar fara, till exempel i korsning, nära övergångsställe eller där sikten är skymd.", "Inom 10 meter före en korsning eller ett övergångsställe är parkering/stannande normalt förbjudet."], "keys": ["10 meter-regeln", "Inte på övergångsställe", "Inte i korsning", "Läs tilläggstavlor"], "visual": "parking"}, {"category": "Trafikregler", "title": "Landsväg", "emoji": "🌲", "sections": ["På landsväg är hastigheterna högre och konsekvenserna större. Titta långt fram och planera tidigt.", "Var beredd på vilt, traktorer, cyklister, skymda utfarter och varierande väglag.", "Vid smal väg kan du behöva använda vägrenen kort för att underlätta, men bara om det kan ske säkert."], "keys": ["Titta långt fram", "Viltvarning", "Sänk före kurva", "Håll avstånd"], "visual": "country"}, {"category": "Trafikregler", "title": "Motorväg & motortrafikled", "emoji": "🛤️", "sections": ["På motorväg får du inte gå, cykla, backa, vända eller stanna annat än vid nödsituation.", "Använd accelerationsfältet för att komma upp i lämplig hastighet och väv in utan att störa.", "Håll långt avstånd. Hög fart gör att små misstag får stora följder."], "keys": ["Stanna inte", "Accelerera före infart", "Håll höger", "Avstånd"], "visual": "motorway"}, {"category": "Trafikregler", "title": "Omkörningar", "emoji": "🚗", "sections": ["Kör om bara om du har fri sikt, tillräcklig sträcka och kan komma tillbaka utan att störa.", "Du får inte köra om strax före eller i korsning, backkrön eller kurva med skymd sikt, om det inte finns särskilda undantag.", "Den som blir omkörd ska underlätta och får inte öka farten."], "keys": ["Fri sikt", "God marginal", "Inte öka farten", "Avbryt vid risk"], "visual": "overtake"}, {"category": "Trafikregler", "title": "Järnvägskorsningar", "emoji": "🚆", "sections": ["Sänk farten och titta åt båda håll. Lita aldrig helt på signaler eller bommar.", "Stanna om rött ljus blinkar, bommar är nere eller på väg ner, eller om tåg närmar sig.", "Kör aldrig in om det finns risk att du blir stående på spåret."], "keys": ["Titta och lyssna", "Stanna vid rött", "Fastna aldrig på spår", "Vitt ljus = kontrollera ändå"], "visual": "rail"}, {"category": "Trafikregler", "title": "Vinter", "emoji": "❄️", "sections": ["Vinterväglag kräver längre avstånd, mjukare styrning och lugnare gas/broms.", "Vinterdäck krävs 1 december–31 mars när det är vinterväglag. Dubbdäck får användas 1 oktober–15 april och även annan tid om vinterväglag råder.", "Broar, skuggiga partier och backkrön kan bli hala först."], "keys": ["Mjuka rörelser", "Längre avstånd", "Vinterdäck vid vinterväglag", "Se upp för is"], "visual": "winter"}, {"category": "Människan", "title": "Alkohol", "emoji": "🍺", "sections": ["Alkohol försämrar omdöme, reaktionstid, syn och koordination. Du kan känna dig pigg men ändå vara farlig i trafiken.", "Gränsen för rattfylleri är 0,2 promille i blodet. Grovt rattfylleri är 1,0 promille eller när körningen är mycket trafikfarlig.", "Kroppen förbränner alkohol långsamt, ungefär 0,1–0,2 promille per timme. Sömn, kaffe eller dusch gör dig inte nykter snabbare."], "keys": ["0,2 promille", "Sämre synfält", "Sämre reaktion", "Dagen efter-risk"], "visual": "alcohol"}, {"category": "Människan", "title": "Trötthet", "emoji": "😴", "sections": ["Trötthet kan vara lika farligt som alkohol. Du får sämre koncentration, långsammare reaktioner och kan nicka till.", "Störst risk finns ofta sent på natten, tidigt på morgonen och i slutet av en lång resa när du nästan är framme.", "Bästa åtgärden är att stanna och sova en kort stund. Musik, öppet fönster eller kaffe löser inte problemet säkert."], "keys": ["Stanna och sov", "Planera pauser", "Byt förare", "Kör inte trött"], "visual": "tired"}, {"category": "Människan", "title": "Synen", "emoji": "👁️", "sections": ["Du behöver rörlig blick eftersom du bara ser skarpt i en liten del av synfältet.", "I mörker minskar möjligheten att bedöma avstånd och hastighet. Bländning kan göra att du ser dåligt i flera sekunder.", "Titta långt fram, använd speglar ofta och kontrollera döda vinkeln vid sidoförflyttning."], "keys": ["Rörlig blick", "Titta långt fram", "Döda vinkeln", "Mörker = större risk"], "visual": "vision"}, {"category": "Människan", "title": "Barn", "emoji": "🧒", "sections": ["Barn är impulsiva och har svårt att bedöma hastighet och avstånd. De kan springa ut utan att titta.", "Barn kortare än 135 cm ska använda särskild skyddsanordning, till exempel bilbarnstol, bältesstol eller kudde.", "Bakåtvänd bilbarnstol är säkrast för små barn. Placera aldrig bakåtvänd stol framför aktiv krockkudde."], "keys": ["Barn är impulsiva", "135 cm-regeln", "Bakåtvänt är säkrast", "Se upp vid skolor"], "visual": "child"}, {"category": "Människan", "title": "Trafikolyckor", "emoji": "🚑", "sections": ["Vid olycka ska du stanna, hjälpa skadade, varna andra och larma 112 vid behov.", "Vid viltolycka med större djur måste du märka ut platsen och kontakta polis.", "Flytta personer bara om de är i direkt fara, till exempel brand. Stoppa blödning med tryck och tryckförband."], "keys": ["Skydda platsen", "Larma 112", "Stoppa blödning", "Märk viltolycka"], "visual": "accident"}, {"category": "Fordon", "title": "Indelning av fordon", "emoji": "🚙", "sections": ["Fordon delas in i bland annat personbil, lastbil, buss, motorcykel, moped, traktor och motorredskap.", "B-körkort gäller i grunden personbil och lätt lastbil med totalvikt högst 3 500 kg, samt vissa släpkombinationer.", "Kontrollera alltid registreringsbeviset om du är osäker på vikt, släp eller behörighet."], "keys": ["Personbil B", "Totalvikt", "Släpregler", "Registreringsbevis"], "visual": "vehicle"}, {"category": "Fordon", "title": "Sträckor", "emoji": "📏", "sections": ["Stoppsträckan består av reaktionssträcka + bromssträcka. Reaktionssträckan är vägen bilen hinner rulla innan du börjar bromsa.", "En enkel huvudräkning: reaktionssträcka ≈ hastighet/10 × 3. Vid 70 km/h blir det cirka 21 meter.", "Bromssträckan ökar med kvadraten på hastigheten. Dubblar du hastigheten blir bromssträckan ungefär fyra gånger längre."], "keys": ["Stopp = reaktion + broms", "70 km/h ≈ 21 m reaktion", "Dubbel fart = 4× broms", "Halka ger längre sträcka"], "visual": "brakecalc"}, {"category": "Fordon", "title": "Däck", "emoji": "🛞", "sections": ["Däcken är bilens kontakt med vägen. Dåligt mönsterdjup eller fel lufttryck ger sämre väggrepp och längre bromssträcka.", "Minsta mönsterdjup är 1,6 mm på sommardäck och 3 mm på vinterdäck vid vinterväglag.", "Bästa däcken ska sitta bak, oavsett framhjulsdrift eller bakhjulsdrift, för att minska risken för sladd."], "keys": ["1,6 mm sommar", "3 mm vinter", "Bästa bak", "Rätt lufttryck"], "visual": "tyre"}, {"category": "Fordon", "title": "Bromsar", "emoji": "🛑", "sections": ["Färdbromsen ska kunna bromsa bilen effektivt och jämnt. Parkeringsbromsen ska kunna hålla bilen stilla.", "ABS gör att hjulen inte låser sig vid hård bromsning. Du kan känna vibrationer i pedalen – det är normalt.", "Våta bromsar kan ge sämre bromsverkan tillfälligt. Testbromsa försiktigt efter djupa vattenpölar om det kan göras säkert."], "keys": ["ABS pulserar", "Bromsvätska", "Testa bromsar", "Våta bromsar"], "visual": "brakes"}, {"category": "Fordon", "title": "Styrning", "emoji": "🧭", "sections": ["Servostyrning hjälper dig att styra lättare men bilen går att styra även om servon slutar fungera, fast det blir tungt.", "Glapp i styrningen, vibrationer eller att bilen drar åt sidan kan tyda på fel.", "Vid sladd ska du styra åt det håll du vill att bilen ska gå och undvika panikbromsning."], "keys": ["Håll båda händer", "Känn fel", "Styr dit du vill", "Lugn vid sladd"], "visual": "steer"}, {"category": "Fordon", "title": "Last och släp", "emoji": "📦", "sections": ["Last ska säkras så att den inte kan glida, falla av eller påverka körningen. Tung last placeras lågt och nära mitten.", "Kultrycket på släp påverkas genom att flytta lasten framåt eller bakåt på släpet.", "För högt eller för lågt kultryck kan göra ekipaget instabilt. Kontrollera registreringsbeviset för vikter."], "keys": ["Säkra alltid last", "Tungt lågt", "Rätt kultryck", "Kolla vikter"], "visual": "load"}, {"category": "Fordon", "title": "Belysning", "emoji": "💡", "sections": ["Du ska använda rätt ljus så att du ser och syns utan att blända andra.", "Helljus används när det är mörkt och ingen risk finns att blända. Blända av i god tid vid möte och när du kommer ikapp fordon.", "Parkeringsljus används när bilen står still i mörker där den behöver synas. Dimljus får bara användas när sikten är kraftigt nedsatt."], "keys": ["Se och synas", "Blända av", "Parkeringsljus vid stopp", "Dimljus vid dimma"], "visual": "light"}, {"category": "Fordon", "title": "Säkerhetskontroller", "emoji": "🔧", "sections": ["Kontrollera däck, bromsar, styrning, belysning, vätskor, speglar och säkerhetsutrustning regelbundet.", "Vid körprov kan du få visa både inre och yttre säkerhetskontroll.", "Upptäcker du fel som påverkar trafiksäkerheten ska du inte köra vidare förrän felet är åtgärdat."], "keys": ["Däck", "Bromsar", "Ljus", "Vätskor"], "visual": "check"}, {"category": "Miljö", "title": "Miljö", "emoji": "🌍", "sections": ["Trafiken påverkar miljön genom utsläpp, buller, partiklar och slitage.", "Koldioxid bidrar till växthuseffekten. Katalysatorn renar flera giftiga ämnen men tar inte bort koldioxid.", "Korta bilresor ger ofta höga utsläpp per kilometer eftersom motorn och katalysatorn är kalla."], "keys": ["CO₂", "Kall motor", "Partiklar", "Buller"], "visual": "environment"}, {"category": "Miljö", "title": "Sparsam körning", "emoji": "🍃", "sections": ["Sparsam körning betyder att planera, hålla jämn fart och undvika onödiga stopp.", "Accelerera bestämt, växla upp tidigt och kör på så hög växel som motorn klarar utan att hacka.", "Motorbromsa i god tid och håll avstånd så att du slipper bromsa och accelerera hela tiden."], "keys": ["Planera långt fram", "Hög växel", "Motorbromsa", "Rätt däcktryck"], "visual": "eco"}, {"category": "Miljö", "title": "Drivmedel", "emoji": "⛽", "sections": ["Bensin och diesel är fossila bränslen som ger nettoutsläpp av koldioxid.", "Förnybara drivmedel som biogas, etanol och el från förnybara källor kan minska klimatpåverkan.", "Val av drivmedel, körsätt och hur ofta du kör påverkar miljön tillsammans."], "keys": ["Fossilt", "Förnybart", "El", "Biogas"], "visual": "fuel"}, {"category": "Vägmärken", "title": "Vägmärken", "emoji": "⚠️", "sections": ["Vägmärken delas in i varningsmärken, väjningspliktsmärken, förbudsmärken, påbudsmärken, anvisningsmärken och lokaliseringsmärken.", "Tilläggstavlor ger extra information, till exempel tid, avstånd, fordonsslag eller villkor.", "Kom ihåg rangordningen: polis, trafiksignal, vägmärke och därefter trafikregel."], "keys": ["Varning", "Förbud", "Påbud", "Tilläggstavla"], "visual": "signs"}, {"category": "Rättsfall", "title": "Hur domstolar dömt", "emoji": "⚖️", "sections": ["Vissa trafikregler kräver bedömning, till exempel vad som räknas som att en gående just ska gå ut på övergångsställe.", "Domstolar tittar på hela situationen: hastighet, avstånd, sikt, väglag och hur tydligt trafikanterna agerade.", "Kör defensivt så minskar risken att hamna i otydliga och farliga situationer."], "keys": ["Rimlig bedömning", "Sikt och hastighet", "Hänsyn", "Defensivt"], "visual": "law"}];

</div>`)}
function tile(t,e,c,fn){return `<button class="tile" style="--c:${c}" onclick="${fn}"><div><span class="emoji">${e}</span><b>${t}</b></div></button>`}
function openTheoryBook(){ window.location.href='teoribok_hemsida/index.html'; }
function tabs(active='Teoribok'){return `<div class="tabs"><button class="tab ${active==='Teoribok'?'active':''}" onclick="theoryList()">Teoribok</button><button class="tab ${active==='Sparat'?'active':''}" onclick="saved()">Sparat</button><button class="tab ${active==='Nyckelord'?'active':''}" onclick="keywords()">Nyckelord</button></div>`}
function theoryList(){ openTheoryBook(); }
function openChapter(i){currentChapter=i; let ch=CHAPTERS[i]; let html=appHeader(ch.title,'Teoribok',true)+`<div class="reader"><button class="listen" onclick="readChapter()">🔊 Lyssna på kapitlet</button>`; html+=visual(ch.visual); ch.sections.forEach((p,idx)=>{html+=`<div class="card"><h2>${idx===0?h(ch.title):subhead(ch.title,idx)}</h2><p>${h(p)}</p>${idx===1?visual(ch.visual):''}</div>`}); html+=`<div class="card note"><b>Kom ihåg:</b> ${ch.keys.map(h).join(' • ')}</div>`; if(ch.title==='Sträckor') html+=brakeExtra(); if(ch.title==='Alkohol') html+=alcoholExtra(); html+=`<div class="navrow"><button class="navbtn" onclick="openChapter(Math.max(0,currentChapter-1))">← Föregående</button><button class="navbtn" onclick="openChapter(Math.min(CHAPTERS.length-1,currentChapter+1))">Nästa →</button></div><button class="listen" onclick="startChapterQuiz()">📝 Testa kapitlet</button></div>`; set(html)}
function subhead(t,i){const m=['Viktigt att förstå','Exempel i trafiken','Vanliga provfrågor','Risker och misstag'];return m[(i-1)%m.length]}
function visual(type){const road=`<svg viewBox="0 0 420 190"><rect width="420" height="190" rx="18" fill="#3e454c"/><line x1="210" y1="0" x2="210" y2="190" stroke="white" stroke-width="7" stroke-dasharray="24 18"/><text x="42" y="45" fill="white" font-size="28" font-weight="bold">Väg</text><text x="250" y="45" fill="white" font-size="24">Körbana</text><rect x="25" y="130" width="70" height="35" rx="8" fill="#2362a2"/><rect x="310" y="60" width="70" height="35" rx="8" fill="#ff7b59"/></svg>`;
const lanes=`<svg viewBox="0 0 420 190"><rect width="420" height="190" rx="18" fill="#3d4852"/><line x1="140" y1="0" x2="140" y2="190" stroke="white" stroke-width="5" stroke-dasharray="18 14"/><line x1="280" y1="0" x2="280" y2="190" stroke="white" stroke-width="5" stroke-dasharray="18 14"/><text x="45" y="100" fill="white" font-size="30">A</text><text x="195" y="100" fill="white" font-size="30">B</text><text x="335" y="100" fill="white" font-size="30">C</text></svg>`;
const brakecalc=`<svg viewBox="0 0 420 220"><rect width="420" height="220" rx="18" fill="#111827"/><text x="30" y="55" fill="white" font-size="28" font-weight="bold">Stoppsträcka</text><text x="30" y="100" fill="#93c5fd" font-size="24">Reaktion + Broms</text><line x1="40" y1="150" x2="380" y2="150" stroke="#fff" stroke-width="8"/><circle cx="120" cy="150" r="16" fill="#ffc66d"/><circle cx="300" cy="150" r="16" fill="#26c766"/><text x="65" y="190" fill="white" font-size="18">Reaktion</text><text x="260" y="190" fill="white" font-size="18">Broms</text></svg>`;
const alcohol=`<svg viewBox="0 0 420 220"><rect width="420" height="220" rx="18" fill="#fff7ed"/><text x="25" y="50" font-size="26" font-weight="bold" fill="#9a3412">Alkohol</text><path d="M60 170 C130 160 150 80 220 95 S310 150 370 70" fill="none" stroke="#ef4444" stroke-width="8"/><text x="40" y="205" font-size="18">Omdöme ↓ Reaktion ↓ Syn ↓</text></svg>`;
const signs=`<svg viewBox="0 0 420 190"><rect width="420" height="190" rx="18" fill="#f8fafc"/><polygon points="70,35 120,125 20,125" fill="#fee2e2" stroke="#ef4444" stroke-width="8"/><circle cx="210" cy="85" r="50" fill="#fee2e2" stroke="#ef4444" stroke-width="8"/><rect x="310" y="45" width="80" height="80" rx="10" fill="#dbeafe" stroke="#2362a2" stroke-width="8"/></svg>`;
const winter=`<svg viewBox="0 0 420 190"><rect width="420" height="190" rx="18" fill="#e0f2fe"/><text x="35" y="115" font-size="72">❄️</text><text x="140" y="85" font-size="28" font-weight="bold">Halka</text><text x="140" y="125" font-size="22">Mjuka rörelser + avstånd</text></svg>`;
const generic=`<svg viewBox="0 0 420 190"><rect width="420" height="190" rx="18" fill="#edf2f7"/><text x="38" y="110" font-size="70">🚗</text><text x="150" y="85" font-size="28" font-weight="bold">Teori</text><text x="150" y="125" font-size="20">Läs, lyssna och testa</text></svg>`;
let map={road,lanes,brakecalc,alcohol,signs,winter,priority:road,crossing:road,roundabout:road,parking:signs,country:road,motorway:lanes,overtake:lanes,rail:signs,tired:alcohol,vision:road,child:road,accident:signs,vehicle:generic,tyre:generic,brakes:brakecalc,steer:generic,load:generic,light:generic,check:generic,environment:generic,eco:generic,fuel:generic,law:signs}; return `<div class="visual">${map[type]||generic}</div>`}
function brakeExtra(){return `<div class="card example"><h2>Räkna snabbt</h2><p><b>Reaktionssträcka:</b> hastigheten / 10 × 3. Exempel 90 km/h: 9 × 3 = cirka 27 meter.</p><p><b>Bromssträcka:</b> om farten dubblas blir bromssträckan ungefär fyra gånger längre. Om 30 km/h ger 6 m, ger 90 km/h ungefär 54 m.</p><div class="formula">Stoppsträcka = reaktionssträcka + bromssträcka</div></div>`}
function alcoholExtra(){return `<div class="card example"><h2>Provfavorit</h2><p>Du kan fortfarande vara olämplig att köra dagen efter, även om alkoholhalten är noll. Trötthet och bakfylla påverkar körförmågan.</p><p>Kaffe, dusch och frisk luft gör dig inte nykter snabbare. Bara tid hjälper.</p></div>`}
function readChapter(){let ch=CHAPTERS[currentChapter]; read(`${ch.title}. `+ch.sections.join(' ')+'. Kom ihåg: '+ch.keys.join(', '))}
function read(t){if(!speechSynthesis)return; speechSynthesis.cancel(); let u=new SpeechSynthesisUtterance(t); u.lang='sv-SE'; u.rate=.9; speechSynthesis.speak(u)}
function makeQuiz(ch){let qs=[]; ch.keys.forEach((k,i)=>{let ci=i%4; let opts=['Ett felaktigt alternativ','Ett riskabelt körsätt','Det som kapitlet varnar för',''].map((x,j)=>x||k); opts[ci]=k; qs.push({q:`Vilket påstående är viktigast i kapitlet ${ch.title}?`,opts,correct:ci})}); while(qs.length<10){let n=qs.length; let ci=(n*2+1)%4; let opt=['Köra snabbare för att hinna fram','Vänta tills andra alltid löser situationen','Titta bara rakt fram','Anpassa körningen efter situationen']; opt[ci]= n%2? 'Ha goda säkerhetsmarginaler och planera i tid':'Anpassa körningen efter riskerna'; qs.push({q:`Vad är mest trafiksäkert i en situation som handlar om ${ch.title.toLowerCase()}?`,opts:opt,correct:ci})} return qs.slice(0,10)}
let cq=[];
function startChapterQuiz(){quizIndex=0;quizScore=0;quizAnswered=false;cq=makeQuiz(CHAPTERS[currentChapter]); renderCQuiz()}
function renderCQuiz(){let q=cq[quizIndex]; set(appHeader('Kapiteltest','Teoribok')+`<div class="quizbox"><div class="status">Fråga ${quizIndex+1} av ${cq.length} • ${quizScore} rätt</div><div class="progress"><div style="width:${(quizIndex/cq.length)*100}%"></div></div><div class="qtitle">${h(q.q)}</div><div class="answers">${q.opts.map((o,i)=>`<button class="answer" onclick="answerC(${i})"><b>${L[i]})</b><span>${h(o)}</span></button>`).join('')}</div></div>`)}
function answerC(i){let q=cq[quizIndex]; document.querySelectorAll('.answer').forEach((b,j)=>{if(j===q.correct)b.classList.add('correct'); if(j===i&&i!==q.correct)b.classList.add('wrong'); b.disabled=true}); if(i===q.correct)quizScore++; setTimeout(()=>{quizIndex++; if(quizIndex<cq.length)renderCQuiz(); else set(appHeader('Resultat','Teoribok')+`<div class="card result"><div class="big">${quizScore}/${cq.length}</div><p>${quizScore>=8?'Bra! Kapiteltestet är godkänt.':'Läs kapitlet en gång till och försök igen.'}</p><button class="primary" onclick="openChapter(currentChapter)">Tillbaka till kapitlet</button></div>`)},800)}
function provList(){let html=appHeader('Prov')+`<div class="prov-grid">`; (window.PROVS||[]).slice(0,4).forEach((p,i)=>{html+=`<button class="prov" onclick="startProv(${i})"><b>${p.title}</b><p>70 frågor • godkänd vid 52 rätt</p></button>`}); html+=`</div>`; set(html)}
function startProv(i){examProv=i;examIndex=0;examAnswers=Array(PROVS[i].questions.length).fill(null); renderProv()}
function renderProv(){let q=PROVS[examProv].questions[examIndex], total=PROVS[examProv].questions.length; let html=appHeader(PROVS[examProv].title,'Hem',true)+`<div class="quizbox"><div class="status">Fråga ${examIndex+1} av ${total}</div><div class="progress"><div style="width:${((examIndex+1)/total)*100}%"></div></div><div class="question-img">${(q.images||[]).map(s=>`<img src="${s}">`).join('')}</div><div class="qtitle">${h(q.text)}</div><div class="answers">${q.options.map((o,i)=>`<button class="answer" onclick="answerProv(${i})"><b>${L[i]})</b><span>${h(o)}</span></button>`).join('')}</div><div class="navrow" style="margin-top:18px"><button class="navbtn" onclick="examIndex=Math.max(0,examIndex-1);renderProv()">← Föregående</button><button class="primary" onclick="nextProv()">Nästa →</button></div></div>`; set(html)}
function answerProv(i){let q=PROVS[examProv].questions[examIndex]; examAnswers[examIndex]=i; document.querySelectorAll('.answer').forEach((b,j)=>{if(j===q.correct)b.classList.add('correct'); if(j===i&&i!==q.correct)b.classList.add('wrong'); b.disabled=true})}
function nextProv(){if(examIndex<PROVS[examProv].questions.length-1){examIndex++;renderProv()}else finishProv()}
function finishProv(){let qs=PROVS[examProv].questions, r=qs.reduce((a,q,i)=>a+(examAnswers[i]===q.correct?1:0),0); set(appHeader('Resultat')+`<div class="card result"><div class="big ${r>=52?'pass':'fail'}">${r}/70</div><h2>${r>=52?'Godkänd':'Icke godkänd'}</h2><p>Du behöver minst 52 rätt för godkänt.</p><button class="primary" onclick="provList()">Till proven</button></div>`)}
function signs(){set(appHeader('Vägmärken')+`<div class="sign-grid"><div class="sign"><div class="s">⚠️</div><b>Varningsmärken</b><p>Varnar för fara. Sänk farten och var beredd.</p></div><div class="sign"><div class="s">⛔</div><b>Förbud</b><p>Visar vad du inte får göra.</p></div><div class="sign"><div class="s">⬆️</div><b>Påbud</b><p>Visar vad du måste göra.</p></div><div class="sign"><div class="s">🅿️</div><b>Anvisning</b><p>Ger information om vägen eller platsen.</p></div></div>`)}
function keywords(){let words=['Högerregeln','Väjningsplikt','Bromssträcka','Reaktionssträcka','Stoppsträcka','Alkohol','Trötthet','ABS','Vinterdäck','Parkering','Cirkulationsplats','Motorväg']; set(appHeader('Nyckelord','Hem')+tabs('Nyckelord')+`<input class="search" placeholder="Sök ord..." oninput="filterWords(this.value)"><div id="words" class="chapter-list">${words.map(w=>`<div class="card"><h2>${w}</h2><p>Sök i teorikapitlen för att repetera ${w.toLowerCase()}.</p></div>`).join('')}</div>`)}
function filterWords(v){document.querySelectorAll('#words .card').forEach(c=>c.style.display=c.textContent.toLowerCase().includes(v.toLowerCase())?'block':'none')}
function saved(){set(appHeader('Sparat')+tabs('Sparat')+`<div class="card"><h2>Sparade kapitel</h2><p>Här kan du senare lägga kapitel du vill repetera.</p></div>`)}
function audioBook(){set(appHeader('Ljudbok')+`<div class="chapter-list">${CHAPTERS.map((c,i)=>`<button class="chapter-card" onclick="currentChapter=${i};readChapter()"><div class="bar" style="--c:${colors[i%colors.length]}"></div><div class="body"><small>${c.category}</small><b>🔊 ${c.title}</b></div><span>▶</span></button>`).join('')}</div>`)}
function videoPage(){set(appHeader('Video')+`<div class="card"><h2>Video</h2><p>Här kan du lägga egna YouTube-länkar eller korta videolektioner senare.</p></div>`)}
function menu(){alert('Meny: Teoribok, Prov, Vägmärken, Ljudbok och Video finns på startsidan.')}
home();
</script>
</body></html>
